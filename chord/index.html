<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chord — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deepest: #0b0d12;
    --bg-dark: #10121a;
    --bg-mid: #15182280;
    --bg-panel: #151820;
    --bg-sidebar: #0f111a;
    --bg-input: #1e2130;
    --bg-hover: #1e2235;
    --bg-active: #252a3d;
    --bg-msg-hover: #1a1d2a;
    --accent: #7c6af7;
    --accent-bright: #9d8fff;
    --accent-dim: #4a3fa8;
    --accent-glow: rgba(124,106,247,0.25);
    --green: #3ddc84;
    --red: #ff5c5c;
    --yellow: #f5f543;
    --text-main: #e0e0e0;
    --text-dim: #949ba4;
    --text-muted: #4e5058;
    --border: rgba(255,255,255,0.06);
    --radius-lg: 12px;
    --radius-md: 8px;
    --radius-sm: 4px;
    --shadow-soft: 0 4px 20px rgba(0,0,0,0.4);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg-deepest);
    color: var(--text-main);
    font-family: 'Sora', sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  button, input { font-family: inherit; }
  .hidden { display: none !important; }

  /* AUTH SCREEN */
  #auth-screen {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at center, #1a1d2e 0%, #0b0d12 100%);
  }

  .auth-card {
    background: var(--bg-panel);
    width: 400px;
    padding: 40px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-soft);
    text-align: center;
  }

  .logo-text {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 32px;
    letter-spacing: -2px;
    margin-bottom: 30px;
    color: var(--accent-bright);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .logo-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }

  .auth-form h2 { margin-bottom: 8px; font-weight: 600; }
  .auth-form p { color: var(--text-dim); margin-bottom: 24px; font-size: 14px; }

  .input-group { text-align: left; margin-bottom: 16px; }
  .input-group label { display: block; font-size: 11px; text-transform: uppercase; font-weight: 700; color: var(--text-dim); margin-bottom: 8px; }
  .input-group input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    padding: 12px;
    color: #fff;
    outline: none;
    transition: border 0.2s;
  }
  .input-group input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: var(--radius-sm);
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--accent-bright); }

  .auth-toggle { margin-top: 20px; font-size: 13px; color: var(--text-dim); }
  .auth-toggle span { color: var(--accent-bright); cursor: pointer; }

  .color-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .color-swatch {
    aspect-ratio: 1;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: transform 0.2s;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.selected { border-color: #fff; }

  /* MAIN APP LAYOUT */
  #chat-screen {
    display: flex;
    height: 100vh;
  }

  .sidebar {
    width: 260px;
    background: var(--bg-sidebar);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
  }

  .sidebar-header {
    padding: 16px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
    font-family: 'Space Mono', monospace;
  }

  .channels-list { flex: 1; overflow-y: auto; padding: 12px 8px; }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--text-dim);
    margin: 16px 8px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .add-btn { cursor: pointer; font-size: 16px; transition: opacity 0.2s; }
  .add-btn:hover { opacity: 1 !important; }

  .channel-item {
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
    font-size: 14px;
  }
  .channel-item:hover { background: var(--bg-hover); color: var(--text-main); }
  .channel-item.active { background: var(--bg-active); color: #fff; }
  .channel-item::before { content: "#"; opacity: 0.5; font-family: 'Space Mono', monospace; }

  .user-bar {
    padding: 12px;
    background: rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .u-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    color: #fff;
  }
  .u-info { flex: 1; overflow: hidden; }
  .u-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .u-status { font-size: 11px; color: var(--text-dim); }

  /* CHAT AREA */
  .chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-panel);
  }

  .chat-header {
    height: 60px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .ch-hash { color: var(--text-dim); font-size: 20px; font-family: 'Space Mono', monospace; }
  .ch-title { font-weight: 600; }

  .messages-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .message { display: flex; gap: 16px; position: relative; }
  .message:hover { background: var(--bg-msg-hover); margin: 0 -20px; padding: 0 20px; }
  
  .del-msg {
    position: absolute;
    right: 25px;
    top: 5px;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    display: none;
  }
  .message:hover .del-msg { display: block; }
  .del-msg:hover { color: var(--red); }

  .msg-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    flex-shrink: 0;
  }
  .msg-content { flex: 1; min-width: 0; }
  .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .msg-user { font-weight: 600; font-size: 14px; cursor: pointer; }
  .msg-user:hover { text-decoration: underline; }
  .msg-time { color: var(--text-dim); font-size: 11px; }
  .msg-text { font-size: 14px; line-height: 1.5; color: #dbdee1; word-wrap: break-word; }

  .input-area { padding: 0 20px 24px; }
  .input-box {
    background: var(--bg-input);
    border-radius: var(--radius-md);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .input-box input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: #fff;
    padding: 8px 0;
    font-size: 14px;
  }
  .typing-indicator { height: 20px; padding: 0 24px; font-size: 12px; color: var(--text-dim); font-style: italic; }

  /* MODALS */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal {
    background: var(--bg-panel);
    width: 440px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 24px;
  }
  .modal h3 { margin-bottom: 20px; }
  .modal-btns { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
  .btn-ghost { background: none; border: none; color: #fff; cursor: pointer; padding: 8px 16px; font-size: 14px; }
  .btn-action { background: var(--accent); border: none; color: #fff; cursor: pointer; padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 600; }


  /* MEMBER LIST */
  .member-list {
    width: 220px;
    background: var(--bg-sidebar);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .member-list-header {
    padding: 16px;
    height: 60px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--text-dim);
    gap: 6px;
  }
  .online-pip {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--green);
    flex-shrink: 0;
  }
  .members-scroll { flex: 1; overflow-y: auto; padding: 12px 8px; }
  .member-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 8px;
    border-radius: var(--radius-sm);
    cursor: default;
    transition: background 0.15s;
  }
  .member-item:hover { background: var(--bg-hover); }
  .member-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px; color: #fff;
    flex-shrink: 0;
  }
  .member-name { font-size: 13px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .member-item:hover .member-name { color: var(--text-main); }
  .you-tag { font-size: 10px; color: var(--text-muted); }

  /* MARKDOWN */
  .msg-text strong { color: #fff; font-weight: 700; }
  .msg-text em { font-style: italic; }
  .msg-text u  { text-decoration: underline; }
  .msg-text del { text-decoration: line-through; opacity: 0.6; }
  .msg-text code {
    background: #1e2030;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: #e06c75;
  }
  .msg-text pre {
    background: #1a1d2e;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin: 6px 0;
    overflow-x: auto;
  }
  .msg-text pre code {
    background: none;
    border: none;
    padding: 0;
    color: #abb2bf;
    font-size: 13px;
  }
  .msg-text blockquote {
    border-left: 4px solid var(--accent-dim);
    padding-left: 12px;
    margin: 4px 0;
    color: var(--text-dim);
    font-style: italic;
  }

  /* TYPING DOTS ANIMATION */
  .typing-indicator { height: 24px; padding: 0 24px 4px; font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .typing-dots { display: inline-flex; gap: 3px; align-items: center; }
  .typing-dots span {
    width: 5px; height: 5px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30%            { transform: translateY(-4px); opacity: 1; }
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2b2d31; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #35373c; }

  }
</style>
</head>
<body>

  <div id="auth-screen">
    <div class="auth-card">
      <div class="logo-text"><div class="logo-dot"></div> CHORDE</div>
      
      <div id="login-view" class="auth-form">
        <h2>Welcome to Chorde!</h2>
        <p>If you've been here before, welcome back!</p>
        <div class="input-group">
          <label>Username</label>
          <input type="text" id="login-user">
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="login-pass">
        </div>
        <button class="btn-primary" onclick="tryLogin()">Log In</button>
        <div class="auth-toggle">Need an account? <span onclick="toggleAuth(false)">Register</span></div>
      </div>

      <div id="reg-view" class="auth-form hidden">
        <h2>Create an account</h2>
        <p>Make sure to save your details somewhere!</p>
        <div class="input-group">
          <label>Username</label>
          <input type="text" id="reg-user">
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="reg-pass">
        </div>
        <label style="display:block; text-align:left; font-size:11px; text-transform:uppercase; font-weight:700; color:var(--text-dim); margin-bottom:12px;">Profile Color</label>
        <div class="color-grid" id="reg-color-grid"></div>
        <button class="btn-primary" onclick="tryRegister()">Continue</button>
        <div class="auth-toggle">Already have an account? <span onclick="toggleAuth(true)">Log In</span></div>
      </div>
    </div>
  </div>

  <div id="chat-screen" class="hidden">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span>CHORDE</span>
        <div class="logo-dot"></div>
      </div>
      
      <div class="channels-list">
        <div class="section-label">
          <span>Text Channels</span>
          <span class="add-btn" onclick="openCreateChannel()">+</span>
        </div>
        <div id="channels-container"></div>
      </div>

      <div class="user-bar">
        <div id="my-avatar" class="u-avatar"></div>
        <div class="u-info">
          <div id="my-name" class="u-name"></div>
          <div class="u-status">Online</div>
        </div>
        <div class="add-btn" style="opacity:0.5" onclick="logout()">⚙</div>
      </div>
    </aside>

    <main class="chat-container">
      <header class="chat-header">
        <span class="ch-hash">#</span>
        <span id="active-ch-title" class="ch-title">Select a channel</span>
      </header>

      <div class="messages-wrap" id="messages-container"></div>

      <div class="typing-indicator" id="typing-box"></div>
      
      <div class="input-area">
        <div class="input-box">
          <input type="text" id="chat-input" placeholder="Message..." onkeydown="handleChatKey(event)" oninput="applyCensorInput(); handleTypingInput()">
        </div>
      </div>
    </main>

    <aside class="member-list">
      <div class="member-list-header">
        <div class="online-pip"></div>
        <span id="online-count">0</span>&nbsp;Online
      </div>
      <div class="members-scroll" id="members-container"></div>
    </aside>
  </div>

  <div id="modal-channel" class="modal-overlay hidden">
    <div class="modal">
      <h3>Create Channel</h3>
      <div class="input-group">
        <label>Channel Name</label>
        <input type="text" id="new-ch-name" placeholder="new-channel">
      </div>
      <div class="modal-btns">
        <button class="btn-ghost" onclick="closeModals()">Cancel</button>
        <button class="btn-action" onclick="createChannel()">Create Channel</button>
      </div>
    </div>
  </div>

  <script>
    // ── CENSOR LIST LOADER ──────────────────────────────────────────────────
    // Fetches censor-list.js from jsDelivr (reliable CORS + CDN).
    // To use: push censor-list.js to your GitHub repo, then set the URL below.
    //   Format: https://cdn.jsdelivr.net/gh/YOUR_USERNAME/YOUR_REPO@main/censor-list.js
    // Works in W3Schools TryIt, GitHub Pages, local servers — anywhere.
    (async function loadCensorList() {
      const CENSOR_URL = 'https://cdn.jsdelivr.net/gh/YOUR_USERNAME/YOUR_REPO@main/censor-list.js';

      try {
        const res = await fetch(CENSOR_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();

        // Pull the array literal out of the JS file and parse it as JSON.
        // The file uses double-quoted strings so JSON.parse handles it cleanly.
        const match = text.match(/\[([\s\S]*)\]/);
        if (!match) throw new Error('Could not find word array in censor list');
        const words = JSON.parse('[' + match[1] + ']');

        // Sort longest-first so longer variants ("a s shole") are matched
        // before shorter overlapping ones ("a s s").
        const sorted = [...words].sort((a, b) => b.length - a.length);

        const parts = sorted.map(word => {
          if (word.includes('*')) {
            // Glob-style wildcards in the list (e.g. "*fuck*", "b*tch"):
            // escape each segment individually, then join with \w* so they
            // match any word characters in place of the asterisk.
            return word
              .split('*')
              .map(seg => seg.replace(/[.+?^${}()|[\]\\]/g, '\\$&'))
              .join('\\w*');
          }
          // Regular entry — escape special chars, then add \b word boundaries
          // only where the word starts/ends with a word character (so entries
          // like "@$$" don't get a boundary that would never match).
          const esc = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const lb = /^\w/.test(word) ? '\\b' : '';
          const rb = /\w$/.test(word)  ? '\\b' : '';
          return lb + esc + rb;
        });

        window.censorRegex = new RegExp(parts.join('|'), 'gi');
        console.log(`Chorde: censor list loaded (${words.length} entries)`);

      } catch (err) {
        console.warn('Chorde: censor list failed to load —', err.message);
      }
    })();
  </script>

  <script>
    const AVATAR_COLORS = ['#ff5c5c','#3ddc84','#7c6af7','#f5f543','#ff9f43','#00d2ff','#ff78cb','#a29bfe','#3CE649','#8F31EF','#007ED4',"#9ED583","#B95809",'#EA4CCA','#389DF5','#61A08B','#77D043','#730415','#6BC41E','#0A06DF','#A98C68','#B8C46C','#ED6275','#FC8B1A'];
    
    // Your specific UID set as Admin
    const ADMIN_UID = "S0mPQ6Ts8bRsFkfRBdnJUUyMEZ43"; 
    const ADMIN_AVATAR = 'https://raw.githubusercontent.com/gamebackup/standalone_games_3/refs/heads/main/chord/grayperson.jpg';
    
    let currentUser = null;
    let currentChannelId = null;
    let selectedRegColor = 0;
    let typingTimer = null;
    let typingUnsubscribe = null;

    // ═══════════════════════════════════════════════════════
    //  AUTH LOGIC
    // ═══════════════════════════════════════════════════════
    function toggleAuth(isLogin) {
      document.getElementById('login-view').classList.toggle('hidden', !isLogin);
      document.getElementById('reg-view').classList.toggle('hidden', isLogin);
    }

    async function tryRegister() {
      const user = document.getElementById('reg-user').value.trim();
      const pass = document.getElementById('reg-pass').value.trim();
      if(!user || pass.length < 6) return alert("Username required and password min 6 chars.");

      const email = `${user.toLowerCase()}@chorde.com`;
      try {
        const cred = await window.fbCreateUser(window.auth, email, pass);
        const userData = {
          uid: cred.user.uid,
          username: user,
          colorIdx: selectedRegColor
        };
        await window.fbSet(window.fbRef(window.db, 'users/' + cred.user.uid), userData);
        setupApp(userData);
      } catch (e) { alert(e.message); }
    }

    async function tryLogin() {
      const user = document.getElementById('login-user').value.trim();
      const pass = document.getElementById('login-pass').value.trim();
      if(!user || !pass) return;

      try {
        const cred = await window.fbSignIn(window.auth, `${user.toLowerCase()}@chorde.com`, pass);
        window.fbOnValue(window.fbRef(window.db, 'users/' + cred.user.uid), (snap) => {
          setupApp(snap.val());
        }, { onlyOnce: true });
      } catch (e) { alert("Login failed. Check credentials."); }
    }

    function logout() {
      window.fbSignOut(window.auth).then(() => location.reload());
    }

    function setupApp(userData) {
      currentUser = userData;
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('chat-screen').classList.remove('hidden');
      
      document.getElementById('my-name').innerText = userData.username;
      const av = document.getElementById('my-avatar');
      av.innerText = userData.username[0].toUpperCase();

      // Apply the PFP if the user is the admin
      if (userData.uid === ADMIN_UID) {
        av.classList.add('admin-pfp-override');
      } else {
        av.style.background = AVATAR_COLORS[userData.colorIdx];
      }

      initChannels();
      setupPresence(userData);
      initMemberList();
    }
    // ═══════════════════════════════════════════════════════
    //  CHANNELS
    // ═══════════════════════════════════════════════════════
    function initChannels() {
      const chRef = window.fbRef(window.db, 'channels');
      window.fbOnValue(chRef, (snap) => {
        const list = document.getElementById('channels-container');
        list.innerHTML = '';
        const data = snap.val() || {};
        
        if (Object.keys(data).length === 0) {
           createChannelRaw('general');
           return;
        }

        Object.keys(data).forEach(id => {
          const div = document.createElement('div');
          div.className = 'channel-item' + (id === currentChannelId ? ' active' : '');
          div.innerText = data[id].name;
          div.onclick = () => switchChannel(id, data[id].name);
          list.appendChild(div);
        });

        if (!currentChannelId) {
          const first = Object.keys(data)[0];
          switchChannel(first, data[first].name);
        }
      });
    }

    function openCreateChannel() { document.getElementById('modal-channel').classList.remove('hidden'); }
    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden')); }

    function createChannel() {
      const nameInp = document.getElementById('new-ch-name');
      const rawName = nameInp.value.trim().toLowerCase().replace(/\s+/g, '-');
      if (!rawName) return;
      createChannelRaw(rawName);
      nameInp.value = '';
      closeModals();
    }

    function createChannelRaw(name) {
      const newRef = window.fbPush(window.fbRef(window.db, 'channels'));
      window.fbSet(newRef, { name: name });
    }

    function switchChannel(id, name) {
      currentChannelId = id;
      document.getElementById('active-ch-title').innerText = name;
      document.getElementById('messages-container').innerHTML = '';
      
      document.querySelectorAll('.channel-item').forEach(el => {
        el.classList.toggle('active', el.innerText === name);
      });

      const msgRef = window.fbRef(window.db, `messages/${id}`);
      
      // Listen for New Messages
      window.fbOnChildAdded(msgRef, (snap) => {
        renderMessage(snap.val(), snap.key);
      });

      // Listen for Deleted Messages
      window.fbOnChildRemoved(msgRef, (snap) => {
        const el = document.getElementById(`msg-${snap.key}`);
        if (el) el.remove();
      });

      // Typing indicators — unsubscribe old channel first
      subscribeTyping(id);
    }

    // ═══════════════════════════════════════════════════════
    //  MARKDOWN
    // ═══════════════════════════════════════════════════════
    // Applied AFTER escHtml so user input is already safe.
    // Process longest/greedy patterns first (code blocks before inline code,
    // bold+italic before bold-only, etc.)
    function parseMarkdown(html) {
      // Code blocks  ```...```
      html = html.replace(/```([\s\S]*?)```/g, (_, c) =>
        `<pre><code>${c.trim()}</code></pre>`);
      // Inline code  `...`
      html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
      // Bold + italic  ***...***
      html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      // Bold  **...**
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Italic  *...*
      html = html.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      // Underline  __...__
      html = html.replace(/__([^_\n]+)__/g, '<u>$1</u>');
      // Strikethrough  ~~...~~
      html = html.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
      // Blockquote  > ...  (escHtml turns > into &gt;)
      html = html.replace(/^&gt;\s?(.+)$/gm, '<blockquote>$1</blockquote>');
      return html;
    }

    // ═══════════════════════════════════════════════════════
    //  PRESENCE  (who is online)
    // ═══════════════════════════════════════════════════════
    function setupPresence(userData) {
      // Firebase's .info/connected is true while the socket is open.
      // We use onDisconnect() to auto-remove the presence record the
      // moment the browser tab closes or the connection drops.
      const connRef = window.fbRef(window.db, '.info/connected');
      window.fbOnValue(connRef, (snap) => {
        if (snap.val() !== true) return;
        const presRef = window.fbRef(window.db, `presence/${userData.uid}`);
        window.fbOnDisconnect(presRef).remove();
        window.fbSet(presRef, {
          uid:      userData.uid,
          username: userData.username,
          color:    AVATAR_COLORS[userData.colorIdx]
        });
      });
    }

    function initMemberList() {
      const presRef = window.fbRef(window.db, 'presence');
      window.fbOnValue(presRef, (snap) => {
        const data = snap.val() || {};
        const members = Object.values(data).sort((a, b) => {
          // Current user always floats to top
          if (a.uid === currentUser.uid) return -1;
          if (b.uid === currentUser.uid) return 1;
          return a.username.localeCompare(b.username);
        });

        document.getElementById('online-count').innerText = members.length;

        const container = document.getElementById('members-container');
        container.innerHTML = '';
        members.forEach(m => {
          const div = document.createElement('div');
          div.className = 'member-item';
          const youTag = m.uid === currentUser.uid ? ' <span class="you-tag">(you)</span>' : '';
         // Check if this member is the admin
          const isAdmin = m.uid === ADMIN_UID;
          const avatarClass = isAdmin ? 'member-avatar admin-pfp-override' : 'member-avatar';
          const avatarStyle = isAdmin ? '' : `style="background:${m.color}"`;

          div.innerHTML = `
            <div class="${avatarClass}" ${avatarStyle}>${escHtml(m.username[0].toUpperCase())}</div>
            <span class="member-name">${escHtml(m.username)}${youTag}</span>
          `;
          container.appendChild(div);
        });
      });
    }

    // ═══════════════════════════════════════════════════════
    //  TYPING INDICATORS
    // ═══════════════════════════════════════════════════════
    function handleTypingInput() {
      if (!currentChannelId || !currentUser) return;
      // Write / refresh our typing record
      window.fbSet(
        window.fbRef(window.db, `typing/${currentChannelId}/${currentUser.uid}`),
        { username: currentUser.username, color: AVATAR_COLORS[currentUser.colorIdx], ts: Date.now() }
      );
      // Auto-clear after 3 s of no keypresses
      clearTimeout(typingTimer);
      typingTimer = setTimeout(clearTyping, 3000);
    }

    function clearTyping() {
      clearTimeout(typingTimer);
      if (!currentChannelId || !currentUser) return;
      window.fbSet(
        window.fbRef(window.db, `typing/${currentChannelId}/${currentUser.uid}`),
        null
      );
    }

    function subscribeTyping(channelId) {
      if (typingUnsubscribe) typingUnsubscribe();   // detach previous listener
      const ref = window.fbRef(window.db, `typing/${channelId}`);
      typingUnsubscribe = window.fbOnValue(ref, (snap) => {
        const data   = snap.val() || {};
        const others = Object.values(data).filter(t => t.uid !== currentUser?.uid);
        const box    = document.getElementById('typing-box');
        const dots   = `<span class="typing-dots"><span></span><span></span><span></span></span>`;

        if (others.length === 0) {
          box.innerHTML = '';
        } else if (others.length === 1) {
          box.innerHTML = `${dots} <strong>${escHtml(others[0].username)}</strong> is typing…`;
        } else if (others.length === 2) {
          box.innerHTML = `${dots} <strong>${escHtml(others[0].username)}</strong> and <strong>${escHtml(others[1].username)}</strong> are typing…`;
        } else {
          box.innerHTML = `${dots} <strong>Several people</strong> are typing…`;
        }
      });
    }

    // ═══════════════════════════════════════════════════════
    //  CENSORING
    // ═══════════════════════════════════════════════════════

    // Full censor pass — always runs regardless of what was just typed.
    // Called by sendMessage() so nothing slips through on submit.
    function censorFull() {
      if (!window.censorRegex) return;
      const input = document.getElementById('chat-input');
      const pos = input.selectionStart;
      window.censorRegex.lastIndex = 0;
      const censored = input.value.replace(window.censorRegex, m => '*'.repeat(m.length));
      if (censored !== input.value) {
        input.value = censored;
        input.setSelectionRange(pos, pos);
      }
    }

    // Live censor — only fires after a word is FINISHED (space, punctuation,
    // emoji, etc.). If the cursor is still inside a word (last char is \w)
    // we do nothing, so letters never get replaced mid-typing.
    function applyCensorInput() {
      if (!window.censorRegex) return;
      const input = document.getElementById('chat-input');
      const lastChar = input.value[input.selectionStart - 1];
      // Still mid-word — skip until the user finishes it
      if (lastChar && /\w/.test(lastChar)) return;
      censorFull();
    }

    // ═══════════════════════════════════════════════════════
    //  MESSAGES
    // ═══════════════════════════════════════════════════════
    function handleChatKey(e) {
      if (e.key === 'Enter') sendMessage();
    }

    function sendMessage() {
      const input = document.getElementById('chat-input');
      // Safety-net pass: always do a full censor before sending,
      // catches anything typed without a trailing space (e.g. word right
      // before hitting Enter) and pasted text.
      censorFull();
      const text = input.value.trim();
      if (!text || !currentChannelId) return;

      const msgData = {
        text: text,
        sender: currentUser.username,
        senderUid: currentUser.uid, // Storing UID to verify deletion rights
        color: AVATAR_COLORS[currentUser.colorIdx],
        ts: Date.now()
      };

      window.fbPush(window.fbRef(window.db, `messages/${currentChannelId}`), msgData);
      input.value = '';
      clearTyping();
    }

    function renderMessage(m, id) {
      const container = document.getElementById('messages-container');
      const div = document.createElement('div');
      div.className = 'message';
      div.id = `msg-${id}`;
      
      const time = new Date(m.ts).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      
      // Verification: User is the sender OR user is the Admin
      const canDelete = (m.senderUid === currentUser.uid || currentUser.uid === ADMIN_UID);
      const delBtn = canDelete ? `<div class="del-msg" onclick="deleteMessage('${id}')" title="Delete Message">×</div>` : '';

      div.innerHTML = `
        <div class="msg-avatar" style="background:${m.color}">${m.sender[0].toUpperCase()}</div>
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-user" style="color:${m.color}">${escHtml(m.sender)}</span>
            <span class="msg-time">${time}</span>
          </div>
          <div class="msg-text">${parseMarkdown(escHtml(m.text))}</div>
        </div>
        ${delBtn}
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    async function deleteMessage(msgId) {
      if (!confirm("Are you sure you want to delete this message?")) return;
      try {
        const msgRef = window.fbRef(window.db, `messages/${currentChannelId}/${msgId}`);
        await window.fbSet(msgRef, null); // Deletes from Firebase
      } catch (e) {
        console.error("Delete failed:", e);
      }
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ═══════════════════════════════════════════════════════
    //  INIT
    // ═══════════════════════════════════════════════════════
    function buildColorGrid() {
      const grid = document.getElementById('reg-color-grid');
      if (!grid) return;
      grid.innerHTML = '';
      AVATAR_COLORS.forEach((c, i) => {
        const s = document.createElement('div');
        s.className = 'color-swatch' + (i === 0 ? ' selected' : '');
        s.style.background = c;
        s.onclick = () => {
          document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('selected'));
          s.classList.add('selected');
          selectedRegColor = i;
        };
        grid.appendChild(s);
      });
    }

    window.addEventListener('DOMContentLoaded', () => {
      buildColorGrid();
      setTimeout(() => {
        if (window.auth) {
          window.auth.onAuthStateChanged((user) => {
            if (user) {
              window.fbOnValue(window.fbRef(window.db, 'users/' + user.uid), (snap) => {
                if (snap.exists()) setupApp(snap.val());
              }, { onlyOnce: true });
            }
          });
        }
      }, 1000);
    });
  </script>
</body>
